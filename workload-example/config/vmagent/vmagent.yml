global:
  scrape_interval: 30s
  external_labels:
    vm_name: "${VM_NAME}"
    csp: "${CSP}"
    public_ip: "${PUBLIC_IP}"
    region: "${REGION}"
    job: "cvm"

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "lighthouse"
    static_configs:
      - targets: ["localhost:5054"]

  - job_name: "tool-node"
    metrics_path: "/debug/metrics/prometheus"
    static_configs:
      - targets: ["localhost:6060"]
