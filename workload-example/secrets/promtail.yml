server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /data/promtail/positions.yaml

clients:
  - url: https://${LOKI_HOST}/loki/api/v1/push
    basic_auth:
      username: ${LOKI_USER}
      password: ${LOKI_PASSWORD}

scrape_configs:
  # Collect container logs from Podman container log files
  # Targets with container name labels are generated by generate-targets.sh
  - job_name: containers
    file_sd_configs:
      - files:
          - /tmp/container-targets.json
        refresh_interval: 15s
    pipeline_stages:
      - cri: {}

  # Collect system journal logs
  - job_name: journal
    journal:
      max_age: 12h
      path: /run/log/journal
      labels:
        job: cvm
        vm_name: ${HOSTNAME}
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
