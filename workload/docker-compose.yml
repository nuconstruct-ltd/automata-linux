version: "3.8"

networks:
  node_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  monitoring:
    driver: bridge

services:
  tool-node:
    image: gcr.io/constellation-458212/tool-node:cons-rc1
    container_name: tool-node
    restart: unless-stopped
    ports:
      - 8545:8545/tcp
      - 8546:8546/tcp
      - 30303:30303/tcp
      - 30303:30303/udp
    expose:
      - 8551
      - 6060
      - 9060
    volumes:
      - /data/data-disk/node:/node
    networks:
      monitoring: {}
      node_net:
        ipv4_address: 172.20.0.2
    command: >-
      --hoodi
      --datadir=/node
      --authrpc.jwtsecret=/node/jwtsecret
      --http.api=engine,eth,web3,net,tool,admin
      --ws.api=engine,eth,web3,net
      --metrics
      --metrics.addr=0.0.0.0
      --metrics.port=6060
      --config=default
      --relay.beacon-endpoints=http://lighthouse:5052
      --relay.secret-key-hex=28c3cd61b687fdd03488e167a5d84f50269df2a4c29a2cfb1390903aa775c5d0
      --allow-unattested
      --tee-verifier=0x0000000000000000000000000000000000000000
      --leader-preset 0xe56c22b9bfddc0e1e0ecfb8bebcac49b4b7f72918dbd696d52121d4d77ad27dd,0xcead54b9d22fadd46b047f97f16097e41f82bd5605edde403ad900f3c1b6c871,0x85bd6592c28038f335f52ff514f9a0feb0d7329fdf09645c9f4a49fea153ed55
      --history.blocks=512
      --history.chain=postmerge
      --history.cutoff-genesis=0xbbe312868b376a3001692a646dd2d7d1e4406380dfd86b98aa8a34d1557c971b
      --history.cutoff-block=1
      --history.cutoff-hash=0xc62962979a16131910a073095eadc7e458679bb9336299cd38a6e715c1c47996
      --discovery.tool-dns=enrtree://APMYYCYNOBWN5EW3D3LK6MYPEXVCZQLM3SXXCJ2Y53QTHYYRWZ5H4@tool.hoodi.sdoba.vip

  lighthouse:
    image: docker.io/sigp/lighthouse:v8.1.0
    container_name: lighthouse
    restart: unless-stopped
    ports:
      - 9000:9000/tcp
      - 9000:9000/udp
    expose:
      - 5054
      - 5052
    networks:
      monitoring: {}
      node_net:
        ipv4_address: 172.20.0.3
    volumes:
      - /data/data-disk/node:/node
    command: >-
      lighthouse bn
      --datadir /node
      --execution-jwt=/node/jwtsecret
      --execution-endpoint=http://tool-node:8551
      --disable-upnp
      --disable-enr-auto-update
      --enr-tcp-port=9000
      --enr-udp-port=9000
      --listen-address=0.0.0.0
      --port=9000
      --discovery-port=9000
      --http
      --http-address=0.0.0.0
      --http-port=5052
      --metrics
      --metrics-address=0.0.0.0
      --metrics-port=5054
      --checkpoint-sync-url=https://checkpoint-sync.hoodi.ethpandaops.io
      --network=hoodi
      --always-prepare-payload
      --prepare-payload-lookahead=12000
      --purge-db-force
      --suggested-fee-recipient=0x00000000000000000000000000000000DeaDBeef

  node-exporter:
    image: docker.io/prom/node-exporter:v1.9.1
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - 9100:9100/tcp
    networks:
      - monitoring

  promtail:
    image: docker.io/grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./config/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./config/generate-targets.sh:/etc/promtail/generate-targets.sh:ro
      - /data/user:/data/user:ro
      - /run/log/journal:/run/log/journal:ro
      - /data/data-disk/promtail:/data/promtail
    environment:
      - HOSTNAME=${HOSTNAME}
      - VM_NAME=${VM_NAME:-cvm}
      - LOKI_HOST=${LOKI_HOST:-loki.example.com}
      - LOKI_USER=${LOKI_USER:-}
      - LOKI_PASSWORD=${LOKI_PASSWORD:-}
    entrypoint: ["/bin/sh", "/etc/promtail/generate-targets.sh"]
    command: -config.file=/etc/promtail/promtail.yml -config.expand-env=true
    networks:
      - monitoring

  controller:
    image: ghcr.io/nuconstruct-ltd/controller:latest
    container_name: controller
    cap_add:
      - NET_ADMIN
    ports:
      - "8080:8080"
      - "2200:2200"
    volumes:
      - /data/data-disk/node/jwtsecret:/node/jwtsecret:ro
    environment:
      - TOOL_NODE_IP=172.20.0.2
      - NODE_NET_SUBNET=172.20.0.0/24
      - PORT=8080
      - CONTROLLER_API_KEY=${CONTROLLER_API_KEY:-}
      - AUTHRPC_URL=http://172.20.0.2:8551
      - JWT_SECRET_PATH=/node/jwtsecret
    networks:
      node_net:
        ipv4_address: 172.20.0.20

  operator:
    image: ghcr.io/nuconstruct-ltd/operator:latest
    container_name: operator
    network_mode: "service:controller"
    depends_on:
      - controller
    environment:
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
    volumes:
      - /data/workload/config:/config
      - /data/data-disk/operator:/root/app

  caddy:
    image: docker.io/library/caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - node_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data:
  caddy_config:
