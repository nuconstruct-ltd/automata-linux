name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: toolkit-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: toolkit-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p toolkit --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/toolkit dist/toolkit
          cd dist
          tar -czvf ${{ matrix.artifact }}.tar.gz toolkit
          rm toolkit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          body: |
            ## toolkit ${{ github.ref_name }}

            Native Rust CLI for deploying Confidential VMs.

            ### Installation

            ```bash
            # Download (pick your platform)
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/toolkit-linux-amd64.tar.gz
            # or
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/toolkit-macos-arm64.tar.gz

            # Extract and install
            tar -xzf toolkit-*.tar.gz
            sudo mv toolkit /usr/local/bin/
            ```

            ### Usage

            ```bash
            toolkit init --csp gcp -o cvm.yaml
            toolkit deploy --config cvm.yaml
            ```

            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
