global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tool-node
    static_configs:
      - targets: ['tool-node:6060']
    metrics_path: /debug/metrics/prometheus

  - job_name: lighthouse
    static_configs:
      - targets: ['lighthouse:5054']
    metrics_path: /metrics
